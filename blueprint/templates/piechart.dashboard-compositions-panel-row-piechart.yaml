apiVersion: widgets.templates.krateo.io/v1beta1
kind: PieChart
metadata:
  name: dashboard-compositions-panel-row-piechart
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    description: Compositions
    series:
      data:
        - color: "green"
          value: 0
          label: "Ready:True"
        - color: "orange"
          value: 0
          label: "Ready:False"
        - color: "gray"
          value: 0
          label: "Unknown"
      total: 0
    title: "0"
  widgetDataTemplate:
    - forPath: series.data[0].value
      expression: >
        ${
          if .aggregate.countBy then
            .aggregate.countBy.ready_true
          else
            (if .slice then .list[0 : (.slice.page * .slice.perPage)] else .list end)
            | map(select((.conditions // [])
                | map(select(.type == "Ready" and .status == "True"))
                | length > 0))
            | length
          end
        }
    - forPath: series.data[1].value
      expression: >
        ${
          if .aggregate.countBy then
            .aggregate.countBy.ready_false
          else
            (if .slice then .list[0 : (.slice.page * .slice.perPage)] else .list end)
            | map(select((.conditions // [])
                | map(select(.type == "Ready" and .status == "False"))
                | length > 0))
            | length
          end
        }
    - forPath: series.data[2].value
      expression: >
        ${
          if .aggregate.countBy then
            .aggregate.countBy.unknown
          else
            (if .slice then .list[0 : (.slice.page * .slice.perPage)] else .list end)
            | map(select((.conditions // [])
                | map(select(.type == "Ready" and (.status == "True" or .status == "False")))
                | length == 0))
            | length
          end
        }
    - forPath: series.total
      expression: >
        ${
          if .aggregate.countBy then
            .aggregate.countBy.total
          else
            (if .slice then .list[0 : (.slice.page * .slice.perPage)] else .list end)
            | length
          end
        }
    - forPath: title
      expression: >
        ${
          if .aggregate.countBy then
            .aggregate.countBy.total | tostring
          else
            (if .slice then .list[0 : (.slice.page * .slice.perPage)] else .list end)
            | length
            | tostring
          end
        }
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
