apiVersion: widgets.templates.krateo.io/v1beta1
kind: PieChart
metadata:
  name: dashboard-compositions-panel-row-piechart
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    description: Compositions
    series:
      data:
        - color: "green"
          value: 0
          label: "Ready:True"
        - color: "orange"
          value: 0
          label: "Ready:False"
        - color: "gray"
          value: 0
          label: "Unknown"
      total: 0
    title: "0"
  widgetDataTemplate:
    - forPath: series.data[0].value
      expression: >
        ${
          (if .slice then .list[0 : (.slice.page * .slice.perPage)] else .list end)
          | map(select((.conditions // [])
              | map(select(.type == "Ready" and .status == "True"))
              | length > 0))
          | length
        }
    - forPath: series.data[1].value
      expression: >
        ${
          (if .slice then .list[0 : (.slice.page * .slice.perPage)] else .list end)
          | map(select((.conditions // [])
              | map(select(.type == "Ready" and .status == "False"))
              | length > 0))
          | length
        }
    - forPath: series.data[2].value
      expression: >
        ${
          (if .slice then .list[0 : (.slice.page * .slice.perPage)] else .list end)
          | map(select((.conditions // [])
              | map(select(.type == "Ready" and (.status == "True" or .status == "False")))
              | length == 0))
          | length
        }
    - forPath: series.total
      expression: >
        ${
          (if .slice then .list[0 : (.slice.page * .slice.perPage)] else .list end)
          | length
        }
    - forPath: title
      expression: >
        ${
          (if .slice then .list[0 : (.slice.page * .slice.perPage)] else .list end)
          | length
          | tostring
        }
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
