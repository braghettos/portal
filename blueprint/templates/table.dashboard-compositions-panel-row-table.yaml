apiVersion: widgets.templates.krateo.io/v1beta1
kind: Table
metadata:
  name: dashboard-compositions-panel-row-table
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    columns:
    - title: Name
      valueKey: name
    - title: Namespace
      valueKey: namespace
    - title: Status
      valueKey: status
    - title: Date
      valueKey: date
    - title: Kind
      valueKey: kind
    - title: ApiVersion
      valueKey: apiversion
    data: []
    pageSize: 10
  widgetDataTemplate:
    - forPath: data
      expression: >
        ${
          (
            ((.list | sort_by(.ts // "") | reverse)) as $sorted
            | (if .slice then $sorted[0 : (.slice.page * .slice.perPage)] else $sorted end)
            | map([
                {
                  valueKey: "key",
                  kind: "jsonSchemaType",
                  type: "string",
                  stringValue: .uid
                },
                {
                  valueKey: "name",
                  kind: "jsonSchemaType",
                  type: "string",
                  stringValue: .name
                },
                {
                  valueKey: "namespace",
                  kind: "jsonSchemaType",
                  type: "string",
                  stringValue: .ns
                },
                {
                  valueKey: "date",
                  kind: "jsonSchemaType",
                  type: "string",
                  stringValue: .ts
                },
                {
                  valueKey: "status",
                  kind: "jsonSchemaType",
                  type: "string",
                  stringValue: (
                    if (.conditions | length > 0) then
                      (.conditions[]? | select(.type == "Ready") | "Ready: " + .status)?
                      // "Status not available"
                    else
                      "Status not available"
                    end
                  )
                },
                {
                  valueKey: "kind",
                  kind: "jsonSchemaType",
                  type: "string",
                  stringValue: .kind
                },
                {
                  valueKey: "apiversion",
                  kind: "jsonSchemaType",
                  type: "string",
                  stringValue: .av
                }
              ])
          )
        }
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
