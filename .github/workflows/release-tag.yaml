name: release-tag

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set chart version
        run: sed -i 's/CHART_VERSION/${{ steps.version.outputs.tag }}/g' ./blueprint/Chart.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: helm package ./blueprint --destination ./.cr-release-packages

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push OCI artifact
        run: helm push ./.cr-release-packages/portal-${{ steps.version.outputs.tag }}.tgz oci://ghcr.io/${{ github.repository_owner }}
