name: release-pullrequest

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set chart version for lint
        run: sed -i 's/CHART_VERSION/0.0.0-pr/g' ./blueprint/Chart.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ./blueprint
